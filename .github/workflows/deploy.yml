# Build static client (React Router + Vite) and sync to S3 via OIDC.
#
# Required repository secrets:
#   AWS_REGION              — e.g. us-east-1
#   AWS_ROLE_TO_ASSUME      — IAM role ARN trusted by GitHub OIDC for this repo
#   S3_BUCKET               — target bucket name (no s3:// prefix)
#
# Optional repository secrets:
#   CLOUDFRONT_DISTRIBUTION_ID — if set, invalidates /* after deploy
#
# Build-time VITE_* / Drive URLs: use committed .env in the repo (Vite loads it during npm run build).

name: Build and Deploy to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  S3_BUCKET: ${{ secrets.S3_BUCKET }}

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

  deploy:
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          if [ -z "${S3_BUCKET}" ]; then
            echo "Error: Repository secret S3_BUCKET is not set"
            exit 1
          fi
          aws s3 sync ./build/client "s3://${S3_BUCKET}" --delete

      - name: Invalidate CloudFront (optional)
        env:
          CF_DIST_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "${CF_DIST_ID}" ]; then
            echo "Skipping CloudFront invalidation (CLOUDFRONT_DISTRIBUTION_ID not set)"
            exit 0
          fi
          aws cloudfront create-invalidation \
            --distribution-id "${CF_DIST_ID}" \
            --paths "/*"
